# Cấu hình bộ nhớ để tránh tràn bộ nhớ khi build
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Required for Flutter Android builds (matches Flutter 3.44 template)
android.useAndroidX=true
android.enableJetifier=true

# AGP 9 new DSL is not fully supported by Flutter Gradle plugin yet.
# Use old DSL until Flutter migrates (see flutter/flutter#180137).
android.newDsl=false
android.builtInKotlin=false

# Avoid Kotlin incremental cache errors when project (D:) and Pub cache (C:) differ.
kotlin.incremental=false
kotlin.incremental.android=false