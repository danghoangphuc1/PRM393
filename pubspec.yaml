name: kidio_app
description: "KIDIO - Transform passive screen time into active guided learning."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.1
  
  # Backend & Database
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  sqflite: ^2.3.3+3
  path_provider: ^2.1.5
  path: ^1.9.0
  
  # UI & Fonts
  google_fonts: ^6.2.1
  
  # AI & Media
  flutter_tts: ^4.2.2
  speech_to_text: ^7.0.0
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
